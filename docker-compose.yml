# Taskly — infra local (ver spec/architecture.md)
# `web` roda fora do compose em dev (npm run dev)
services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://taskly:taskly@postgres:5432/taskly}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      # Extensão — assistente (ADR-003). Compose lê `${ANTHROPIC_API_KEY}` de um
      # .env na raiz do projeto (convenção do próprio Docker Compose) ou do
      # ambiente do shell; `:-` evita erro em clone novo sem a variável definida
      # — vazio só desabilita o endpoint de chat, resto do app sobe normal.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ASSISTANT_MODEL: ${ASSISTANT_MODEL:-claude-haiku-4-5-20251001}
      # Observabilidade do assistente (ADR-005) — Langfuse self-host, subido à parte
      # via `docker-compose.langfuse.yml`. Chaves vazias desabilitam o tracing
      # (client em modo no-op), igual ao padrão do ANTHROPIC_API_KEY acima.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://host.docker.internal:3001}
    volumes:
      - uploads_data:/app/uploads
    # host.docker.internal só resolve nativamente no Docker Desktop (Windows/Mac);
    # `host-gateway` torna a mesma URL válida também em Docker Engine no Linux
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskly
      POSTGRES_PASSWORD: taskly
      POSTGRES_DB: taskly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskly -d taskly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  uploads_data:
